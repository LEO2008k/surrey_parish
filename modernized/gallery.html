<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Cross Parish</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .gallery-item {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-hover);
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">Cross<span>Parish</span></a>
            <button class="mobile-menu-btn">☰</button>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="schedule.html">Schedule</a></li>
                    <li><a href="gallery.html" style="color: var(--primary-gold);">Gallery</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero" style="min-height: 400px; height: 50vh; background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy-light) 100%);">
        <div class="hero-content">
            <h1>Photo Gallery</h1>
        </div>
    </section>

    <section class="section-padding container">
        <div style="text-align: center; margin-bottom: 3rem;">
            <p>Holy Cross is an active place with many activities. Enjoy these photos from some of our special events, from kids camps to Easter blessing baskets.</p>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item" style="background: linear-gradient(135deg, var(--primary-gold) 0%, #a67c21 100%);"></div>
            <div class="gallery-item" style="background: linear-gradient(135deg, var(--navy-light) 0%, #2a4175 100%);"></div>
            <div class="gallery-item" style="background: linear-gradient(135deg, var(--primary-gold) 0%, #a67c21 100%);"></div>
            <div class="gallery-item" style="background: linear-gradient(135deg, var(--navy-light) 0%, #2a4175 100%);"></div>
            <div class="gallery-item" style="background: linear-gradient(135deg, var(--primary-gold) 0%, #a67c21 100%);"></div>
            <div class="gallery-item" style="background: linear-gradient(135deg, var(--navy-light) 0%, #2a4175 100%);"></div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-col">
                <a href="index.html" class="logo" style="color: white;">Cross<span style="color: var(--primary-gold);">Parish</span></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
